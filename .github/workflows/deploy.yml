name: Deploy via Base64 Key

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || '' }}
          timeout: 60s
          command_timeout: 900s
          script: |
            mkdir -p /www/wwwroot/urlopy
            cd /www/wwwroot/urlopy

            # Zatrzymaj stary kontener (je�li istnieje)
            docker-compose -f docker-compose.prod.yml down || true

      - name: Copy project to VPS using tar pipe
        run: |
          mkdir -p ~/.ssh/
          
          # Skopiuj ca�y projekt (bez build artefakt�w i lokalnej bazy dev)
          tar czf - \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=dev.db \
            --exclude=prisma/prod.db \
            . | ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cd /www/wwwroot/urlopy && tar xzf -"
          
          # Usu� klucz tymczasowy
          rm -f ~/.ssh/deploy_key

      - name: Build and start containers on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || '' }}
          timeout: 60s
          command_timeout: 900s
          script: |
            cd /www/wwwroot/urlopy
            
            # Zbuduj obraz Docker na VPS
            docker-compose -f docker-compose.prod.yml build
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wyczy�� stare obrazy (opcjonalnie)
            docker image prune -f || true
            
            # Sprawd� status
            docker-compose -f docker-compose.prod.yml ps
            docker-compose -f docker-compose.prod.yml logs --tail=50
