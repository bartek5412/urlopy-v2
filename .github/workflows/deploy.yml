name: Deploy via Base64 Key

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh/
          
          # DEKODOWANIE KLUCZA Z BASE64 DO PLIKU
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          
          # Ustawienie uprawnień (krytyczne!)
          chmod 600 ~/.ssh/id_rsa
          
          # Debugowanie (sprawdzamy czy klucz wygląda poprawnie, nie pokazując go)
          echo "Klucz wgrany. Pierwsza linia:"
          head -n 1 ~/.ssh/id_rsa
          
          # Wyłączenie sprawdzania hosta (dla uproszczenia w CI)
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null" > ~/.ssh/config

      - name: Copy files via SCP
        run: |
          # Używamy flagi -v (verbose) żeby widzieć co się dzieje
          scp -v -P 48624 -i ~/.ssh/id_rsa -r docker-compose.prod.yml prisma/ ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/opt/urlopy-v2

      - name: Deploy via SSH
        run: |
          ssh -v -p 48624 -i ~/.ssh/id_rsa ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/urlopy-v2
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml build
            docker-compose -f docker-compose.prod.yml up -d
            docker image prune -f
          EOF
