name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || '' }}
          timeout: 60s
          command_timeout: 900s
          script: |
            mkdir -p /www/wwwroot/urlopy
            cd /www/wwwroot/urlopy

            # Zatrzymaj stary kontener (jeśli istnieje)
            docker-compose -f docker-compose.prod.yml down || true

      - name: Copy project to VPS using tar pipe
        run: |
          # Przygotuj klucz SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Skopiuj cały projekt (bez build artefaktów i lokalnej bazy dev)
          tar czf - \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=dev.db \
            --exclude=prisma/prod.db \
            . | ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || 22 }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cd /www/wwwroot/urlopy && tar xzf -"
          
          # Usuń klucz tymczasowy
          rm -f ~/.ssh/deploy_key

      - name: Build and start containers on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE || '' }}
          timeout: 60s
          command_timeout: 900s
          script: |
            cd /www/wwwroot/urlopy
            
            # Zbuduj obraz Docker na VPS
            docker-compose -f docker-compose.prod.yml build
            
            # Uruchom nowy kontener
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wyczyść stare obrazy (opcjonalnie)
            docker image prune -f || true
            
            # Sprawdź status
            docker-compose -f docker-compose.prod.yml ps
            docker-compose -f docker-compose.prod.yml logs --tail=50
