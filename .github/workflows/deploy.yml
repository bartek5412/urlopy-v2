name: Deploy via Base64 Key

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build app
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"
          DATABASE_URL: "file:./prisma/dev.db"
          NPM_CONFIG_PRODUCTION: "false"
        run: |
          npm ci
          npm run build

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh/
          
          # DEKODOWANIE KLUCZA Z BASE64 DO PLIKU
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          
          # Ustawienie uprawnień (krytyczne!)
          chmod 600 ~/.ssh/id_rsa
          
          # Debugowanie (sprawdzamy czy klucz wygląda poprawnie, nie pokazując go)
          echo "Klucz wgrany. Pierwsza linia:"
          head -n 1 ~/.ssh/id_rsa
          
          # Wyłączenie sprawdzania hosta (dla uproszczenia w CI)
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null" > ~/.ssh/config

      - name: Copy repo via tar pipe
        run: |
          ssh -v -p 48624 -i ~/.ssh/id_rsa ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
            mkdir -p /www/wwwroot/urlopy
          EOF

          tar czf - \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=dev.db \
            --exclude=prisma/prod.db \
            . | ssh -v -p 48624 -i ~/.ssh/id_rsa ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cd /www/wwwroot/urlopy && tar xzf -"

      - name: Deploy via SSH
        run: |
          ssh -v -p 48624 -i ~/.ssh/id_rsa ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /www/wwwroot/urlopy
            set -e
            set -o pipefail
            trap 'echo "Deploy failed. Showing status and logs..." && docker-compose -f docker-compose.prod.yml ps -a || true; docker-compose -f docker-compose.prod.yml logs --no-color --tail=200 || true' ERR
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml build
            docker-compose -f docker-compose.prod.yml run --rm urlopy-app npm run prisma:migrate
            docker-compose -f docker-compose.prod.yml up -d
            docker image prune -f
          EOF
