name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # KROK 1: Kopiowanie plików (zamiast ręcznego SSH pipe)
      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 48624
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "docker-compose.prod.yml,prisma/"
          target: "/opt/urlopy-v2"
          # strip_components pomaga, jeśli kopiujesz foldery, ale tu kopiujemy bezpośrednio
          debug: true
          use_insecure_cipher: true

      # KROK 2: Logowanie SSH i uruchomienie (Deploy)
      - name: Deploy and Restart Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 48624
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          timeout: 60s
          command_timeout: 900s
          debug: true
          use_insecure_cipher: true
          script: |
            cd /opt/urlopy-v2
            
            # Jeśli używasz Gita na serwerze (opcjonalne, skoro kopiujemy pliki wyżej)
            # if [ -d ".git" ]; then
            #   git pull origin master || true
            # fi

            # Przebuduj i uruchom
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml build
            docker-compose -f docker-compose.prod.yml up -d
            
            # Sprzątanie
            docker image prune -f
            docker-compose -f docker-compose.prod.yml ps
